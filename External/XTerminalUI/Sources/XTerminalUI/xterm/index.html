<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <title>Solid App</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #000000;
      }
      #root {
        width: 100%;
        height: 100%;
      }
      /* Enable text selection on iOS for terminal */
      .xterm {
        -webkit-user-select: text !important;
        -ms-user-select: text !important;
        user-select: text !important;
      }
      .xterm * {
        -webkit-user-select: text !important;
        -ms-user-select: text !important;
        user-select: text !important;
      }
    </style>
    <script type="module" crossorigin src="./assets/index.c572b01f.js"></script>
    <link rel="stylesheet" href="./assets/index.12cbc7e7.css">
    <script>
      // Global function to set terminal theme
      // This will be called from Swift

      // Store pending theme if terminal is not ready
      var pendingTheme = null;

      // Make terminal globally accessible for copy functionality
      window.term = null;

      window.setTerminalTheme = function(theme) {
        // Set body background to match theme
        if (theme && theme.background) {
          document.body.style.backgroundColor = theme.background;
        }

        // Try to find the terminal object
        var terminal = window.M || window.term || window.terminal;

        if (terminal && terminal.options) {
          try {
            terminal.options.theme = theme;
            terminal.refresh(0, terminal.rows - 1);
            pendingTheme = null;
          } catch (e) {
            console.error('Error setting theme:', e);
            pendingTheme = theme;
          }
        } else {
          pendingTheme = theme;
          // Retry after delay
          setTimeout(function() {
            var terminal = window.M || window.term || window.terminal;
            if (pendingTheme && terminal && terminal.options) {
              window.setTerminalTheme(pendingTheme);
            }
          }, 500);
        }
      };

      // Store pending font if terminal is not ready
      var pendingFont = null;

      window.setTerminalFont = function(fontName) {
        // Try to find the terminal object
        var terminal = window.M || window.term || window.terminal;

        if (terminal && terminal.options) {
          try {
            // Set font family with fallback to monospace
            terminal.options.fontFamily = '"' + fontName + '", monospace';
            pendingFont = null;
          } catch (e) {
            pendingFont = fontName;
          }
        } else {
          pendingFont = fontName;
          // Retry after delay
          setTimeout(function() {
            var terminal = window.M || window.term || window.terminal;
            if (pendingFont && terminal && terminal.options) {
              window.setTerminalFont(pendingFont);
            }
          }, 500);
        }
      };

      // Watch for terminal to be ready and apply any pending theme
      var checkInterval = setInterval(function() {
        // Try multiple possible variable names
        var terminal = window.M || window.term || window.terminal;

        // Debug: log what we found
        if (!terminal) {
          console.log('[Terminal] Checking... window.M:', typeof window.M, 'window.term:', typeof window.term);
        }

        // Check if terminal has options or write method (more reliable)
        if (terminal && (terminal.options || terminal.write)) {
          clearInterval(checkInterval);
          // Store globally for copy functionality
          window.term = terminal;
          console.log('[Terminal] Terminal object found and stored in window.term');
          console.log('[Terminal] Type:', typeof terminal, 'Keys:', Object.keys(terminal).slice(0, 10).join(', '));

          if (pendingTheme) {
            window.setTerminalTheme(pendingTheme);
          }
          if (pendingFont) {
            window.setTerminalFont(pendingFont);
          }
        }
      }, 100);

      // Stop checking after 10 seconds
      setTimeout(function() {
        clearInterval(checkInterval);
        if (!window.term) {
          console.error('[Terminal] Failed to find terminal object after 10 seconds');
        }
      }, 10000);
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>


  </body>
</html>
